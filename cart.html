<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة التسوق - متجري</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-store"></i> متجري</h2>
            </div>
            <nav class="nav">
                <a href="index.html">الرئيسية</a>
                <a href="products.html">المنتجات</a>
                <a href="cart.html">سلة التسوق</a>
                <a href="#contact">تواصل معنا</a>
            </nav>
            <div class="user-menu" onclick="toggleUserMenu()">
    <i class="fas fa-user"></i>
    <span id="userName">الدخول</span>
</div>
            <div class="menu-toggle"><i class="fas fa-bars"></i></div>
        </div>
    </header>

    <!-- Cart Section -->
    <section class="cart-section">
        <div class="container">
            <h2 class="section-title">سلة التسوق</h2>
            <div id="cartEmpty" class="cart-empty">
                <i class="fas fa-shopping-cart" style="font-size: 5rem; color: #ddd;"></i>
                <h3>سلة التسوق فارغة</h3>
                <p>لم تقم بإضافة أي منتجات بعد</p>
                <a href="products.html" class="cta-btn">تسوق الآن</a>
            </div>
            <div id="cartItems" class="cart-items" style="display: none;">
                <div class="cart-table">
                    <div class="cart-header">
                        <div>المنتج</div>
                        <div>السعر</div>
                        <div>الكمية</div>
                        <div>المجموع</div>
                        <div>إجراء</div>
                    </div>
                    <div id="cartRows"></div>
                </div>
                <div class="cart-summary">
                    <div class="summary-row">
                        <span>المجموع الفرعي:</span>
                        <span id="subtotal">0 د.ل</span>
                    </div>
                    <div class="summary-row">
                        <span>الشحن:</span>
                        <span>15 د.ل</span>
                    </div>
                    <div class="summary-row total">
                        <span>الإجمالي:</span>
                        <span id="total">0 د.ل</span>
                    </div>
                    <div class="checkout-actions">
                        <button class="clear-cart" id="clearCart">إفراغ السلة</button>
                        <a href="https://wa.me/218912345678?text=مرحبا، أريد إتمام طلبي" class="cta-btn checkout-btn">
                            إتمام الطلب <i class="fab fa-whatsapp"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/218912345678" class="whatsapp-btn" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 متجري. جميع الحقوق محفوظة.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-whatsapp"></i></a>
            </div>
        </div>
    </footer>

    <!-- Product Modal -->
    <div id="productModal" class="product-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="productModalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Initialize cart page
        document.addEventListener('DOMContentLoaded', function() {
            loadCartPage();
        });

        function loadCartPage() {
            const cart = JSON.parse(localStorage.getItem('cart')) || [];
            const cartCount = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCounter = document.querySelector('.cart-count');
            
            if (cartCounter) cartCounter.textContent = cartCount;

            if (cart.length === 0) {
                document.getElementById('cartEmpty').style.display = 'block';
                document.getElementById('cartItems').style.display = 'none';
                return;
            }

            document.getElementById('cartEmpty').style.display = 'none';
            document.getElementById('cartItems').style.display = 'block';

            renderCartItems(cart);
        }

        function renderCartItems(cart) {
            const cartRows = document.getElementById('cartRows');
            let subtotal = 0;

            cartRows.innerHTML = cart.map(item => {
                const total = item.price * item.quantity;
                subtotal += total;
                return `
                    <div class="cart-row">
                        <div class="cart-product">
                            <img src="${item.img}" alt="${item.name}">
                            <div>
                                <h4>${item.name}</h4>
                                <p>${item.price} د.ل / قطعة</p>
                            </div>
                        </div>
                        <div class="cart-price">${item.price} د.ل</div>
                        <div class="cart-quantity">
                            <button onclick="updateQuantity(${item.id}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 1)">+</button>
                        </div>
                        <div class="cart-total">${total} د.ل</div>
                        <div class="cart-remove">
                            <button onclick="removeFromCart(${item.id})" class="remove-btn">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            const shipping = 15;
            document.getElementById('subtotal').textContent = subtotal + ' د.ل';
            document.getElementById('total').textContent = (subtotal + shipping) + ' د.ل';
        }

        document.getElementById('clearCart')?.addEventListener('click', function() {
            localStorage.removeItem('cart');
            loadCartPage();
            updateCartCounter();
            showToast('تم إفراغ السلة');
        });
    </script>
</body>
</html>
